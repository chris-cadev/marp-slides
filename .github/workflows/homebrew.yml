name: Homebrew

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Publish"]
    types: [completed]

permissions:
  contents: write

jobs:
  homebrew:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Make script executable
        run: chmod +x marp-slides.ts

      - name: Calculate SHA256
        id: sha
        run: |
          echo "hash=$(sha256sum marp-slides.ts | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Create Homebrew Formula
        env:
          SHA256: ${{ steps.sha.outputs.hash }}
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p Formula
          cat > Formula/marp-slides.rb << 'EOF'
          class MarpSlides < Formula
            desc "Export Marp presentations to PNG images"
            homepage "https://github.com/chris-cadev/marp-slides"
            url "https://github.com/chris-cadev/marp-slides/releases/download/vVERSION/marp-slides"
            sha256 "SHA256"
            license "MIT"
            version "VERSION"

            depends_on "bun" => :recommended

            def install
              bin.install "marp-slides" => "marp-slides"
            end

            test do
              system "#{bin}/marp-slides", "--version"
            end
          end
          EOF
          sed -i "s/VERSION/${{ env.VERSION }}/g" Formula/marp-slides.rb
          sed -i "s/SHA256/${{ env.SHA256 }}/g" Formula/marp-slides.rb

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          commit-message: "Update marp-slides to ${{ steps.version.outputs.VERSION }}"
          branch: marp-slides-${{ steps.version.outputs.VERSION }}
          delete-branch: true
          title: "marp-slides ${{ steps.version.outputs.VERSION }}"
          body: |
            Created by GitHub Actions

            Version: ${{ steps.version.outputs.VERSION }}
            SHA256: ${{ steps.sha.outputs.hash }}

            Download from: https://github.com/chris-cadev/marp-slides/releases/tag/v${{ steps.version.outputs.VERSION }}
          labels: |
            homepage
            marp-slides
          token: ${{ secrets.GITHUB_TOKEN }}

name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  actions: write

jobs:
  npm-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish to npm (OIDC)
        run: npm publish --provenance --access public --tag beta

  jsr-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Publish to JSR (OIDC)
        run: bunx jsr publish
        continue-on-error: true

  release:
    runs-on: ubuntu-latest
    needs: [npm-publish, jsr-publish]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make script executable
        run: chmod +x marp-slides.ts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            marp-slides.ts
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Homebrew workflow
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/homebrew.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}"}'

      - name: Trigger winget workflow
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/winget.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}"}'
